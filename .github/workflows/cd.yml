name: CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -s "${{ secrets.RENDER_DEPLOY_HOOK }}" \
            -X POST \
            --fail \
            --output /dev/null \
            --write-out "HTTP Status: %{http_code}\n"
